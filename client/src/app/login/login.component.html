<form #userForm="ngForm"
  (ngSubmit)="login()"
  class="min-h-screen md:min-h-0 flex flex-col md:flex-row justify-center items-center px-8 md:px-20 gap-4 md:gap-10">
  <div class="my-4 md:my-10 rounded w-full md:w-90 flex flex-col gap-5 backdrop-blur-sm bg-white/30 p-6 shadow-lg">
    <div class="text-center mt-6 md:mt-10">
      <i class="material-icons text-5xl text-white">person</i>
      <div class="text-2xl my-2 font-medium text-white">Login</div>
    </div>
    
    <div class="w-full px-5">
      <mat-form-field class="w-full" appearance="fill">
        <mat-label class="text-white">Email</mat-label>
        <input matInput required name="email" [(ngModel)]="email" #emailModel="ngModel" placeholder="Email"/>
        @if(emailModel.errors?.['required']){
          <mat-error>Email is required</mat-error>
        }
      </mat-form-field>

      <mat-form-field class="w-full" appearance="fill">
        <mat-label class="text-white">Password</mat-label>
        <input matInput [type]="hide()?'text':'password'" required name="password" [(ngModel)]="password"
          #passwordModel="ngModel"
          placeholder="Password"/>
        <mat-icon (click)="togglePassword($event)" matSuffix class="text-white">
          {{ hide() ? 'visibility_off' : 'visibility' }}
        </mat-icon>
        @if(passwordModel.errors?.['required']){
          <mat-error>Password is required</mat-error>
        }
      </mat-form-field>

      <button type="submit"
        [disabled]="!userForm.valid" 
        class="w-full mb-5 bg-white text-blue-900 rounded-md p-2 disabled:opacity-30 hover:bg-white/90 transition">
        Login
      </button>
      
      <p class="font-bold text-xs text-center text-white">
        Don't have an account? 
        <a class="text-blue-200 hover:text-white" [routerLink]="'/register'">Register</a>
      </p>
    </div>
  </div> 
</form>
